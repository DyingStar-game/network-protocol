name: "Validate schemas"

on:
  push:
  pull_request:

jobs:
  validate:
    name: Validate JSON schemas
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Validate all schemas
        run: npm run validate
